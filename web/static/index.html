<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperliquid Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--border:#2a2a2f;
  --text:#e8e8ee;--muted:#6b6b80;
  --green:#00c896;--red:#ff4466;--yellow:#f5a623;--blue:#4dabf7;--purple:#9775fa;
}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── header ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:14px;font-weight:700;letter-spacing:.5px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.wait{background:var(--yellow);animation:pulse 1s infinite}
#status{color:var(--muted);font-size:11px}
.spacer{flex:1}
#cnt{color:var(--muted);font-size:11px}
button{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit}
button:hover{color:var(--text)}
button.on{color:var(--green);border-color:var(--green)}
button.danger:hover{color:var(--red);border-color:var(--red)}

/* ── layout ── */
.layout{display:flex;flex:1;min-height:0}

/* ── sidebar ── */
aside{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:10px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);letter-spacing:.5px;font-weight:600}
.wallet-add{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.wallet-add input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:3px;font-size:12px;font-family:inherit;outline:none;width:100%}
.wallet-add input:focus{border-color:var(--blue)}
.wallet-add input::placeholder{color:var(--muted)}
.btn-add{background:var(--blue);border-color:var(--blue);color:#000;font-weight:600;width:100%;padding:5px}
.btn-add:hover{background:#74c0fc;border-color:#74c0fc;color:#000}
#wallet-list{flex:1;overflow-y:auto;padding:6px 0}
#wallet-list::-webkit-scrollbar{width:3px}
#wallet-list::-webkit-scrollbar-thumb{background:var(--border)}
.wallet-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid transparent;cursor:pointer}
.wallet-item:hover{background:var(--bg3)}
.wallet-item.active{background:rgba(77,171,247,.08);border-left:2px solid var(--blue)}
.wallet-addr{flex:1;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wallet-label{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wallet-del{color:var(--muted);font-size:14px;flex-shrink:0;opacity:0;transition:opacity .1s}
.wallet-item:hover .wallet-del{opacity:1}
.wallet-del:hover{color:var(--red)}
#no-wallets{padding:16px 12px;color:var(--muted);font-size:12px;text-align:center}

/* ── main panel ── */
main{flex:1;display:flex;flex-direction:column;min-width:0}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.f{padding:2px 9px}
.f.active{color:var(--text);border-color:var(--blue)}
#feed{flex:1;overflow-y:auto;padding:4px 0}
#feed::-webkit-scrollbar{width:4px}
#feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── events ── */
.ev{display:flex;align-items:flex-start;gap:10px;padding:7px 14px;border-bottom:1px solid transparent;animation:fadeIn .15s ease-out}
.ev:hover{background:var(--bg2)}
.ev-icon{font-size:15px;flex-shrink:0;width:18px;text-align:center;margin-top:1px}
.ev-body{flex:1;min-width:0}
.ev-head{display:flex;align-items:baseline;gap:8px}
.ev-kind{font-weight:700;font-size:11px;letter-spacing:.5px}
.ev-addr{color:var(--muted);font-size:10px}
.ev-time{color:var(--muted);font-size:10px;margin-left:auto;flex-shrink:0}
.ev-detail{margin-top:2px;color:var(--muted);font-size:12px;line-height:1.6}
.v{color:var(--text)}
.g{color:var(--green)}.r{color:var(--red)}.y{color:var(--yellow)}.b{color:var(--blue)}.p{color:var(--purple)}
.tag{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:0 4px;font-size:10px;color:var(--muted);vertical-align:middle}
.tag.buy{color:var(--green);border-color:var(--green)}
.tag.sell{color:var(--red);border-color:var(--red)}
.tag.twap{color:var(--purple);border-color:var(--purple)}

#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px}
#empty .big{font-size:40px}

@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<header>
  <div class="dot wait" id="dot"></div>
  <h1>⚡ Hyperliquid Tracker</h1>
  <span id="status">connecting…</span>
  <div class="spacer"></div>
  <span id="cnt">0 events</span>
  <button id="snd-btn">🔇 sound</button>
  <button id="clr-btn" class="danger">clear</button>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-head">WALLETS</div>
    <div class="wallet-add">
      <input id="inp-addr" placeholder="0x address…" maxlength="42">
      <input id="inp-label" placeholder="label (optional)">
      <button class="btn-add" id="btn-add">+ Add wallet</button>
    </div>
    <div id="wallet-list"><div id="no-wallets">No wallets yet</div></div>
  </aside>

  <main>
    <div class="toolbar">
      <button class="f active" data-k="all">ALL</button>
      <button class="f" data-k="fill">FILLS</button>
      <button class="f" data-k="order_update">ORDERS</button>
      <button class="f" data-k="twap_update">TWAP</button>
      <button class="f" data-k="liquidation">LIQ</button>
      <button class="f" data-k="funding">FUNDING</button>
    </div>
    <div id="feed">
      <div id="empty"><div class="big">📡</div><div>Waiting for events…</div></div>
    </div>
  </main>
</div>

<script>
const feed=document.getElementById('feed'),empty=document.getElementById('empty'),
  dot=document.getElementById('dot'),statusEl=document.getElementById('status'),
  cnt=document.getElementById('cnt'),sndBtn=document.getElementById('snd-btn'),
  clrBtn=document.getElementById('clr-btn'),wList=document.getElementById('wallet-list'),
  noW=document.getElementById('no-wallets'),inpAddr=document.getElementById('inp-addr'),
  inpLabel=document.getElementById('inp-label'),btnAdd=document.getElementById('btn-add');

let soundOn=false,evCount=0,activeFilter='all',audioCtx=null;

sndBtn.onclick=()=>{
  soundOn=!soundOn;
  sndBtn.textContent=soundOn?'🔊 sound':'🔇 sound';
  sndBtn.className=soundOn?'on':'';
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
};
clrBtn.onclick=()=>{feed.querySelectorAll('.ev').forEach(e=>e.remove());evCount=0;cnt.textContent='0 events';empty.style.display='flex';};

document.querySelectorAll('.f').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.f').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');activeFilter=b.dataset.k;
  feed.querySelectorAll('.ev').forEach(e=>{e.style.display=(activeFilter==='all'||e.dataset.k===activeFilter)?'':'none';});
});

function beep(f=880,d=80,v=.12){
  if(!soundOn||!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d/1000);
  o.start();o.stop(audioCtx.currentTime+d/1000);
}

function fmt(n){return parseFloat(n).toLocaleString('en-US',{maximumFractionDigits:4});}
function fmtPnl(n){const v=parseFloat(n);return(v>=0?'+':'')+v.toFixed(2);}
function short(a){return a?a.slice(0,6)+'…'+a.slice(-4):'';}
function ts(){const d=new Date();return[d.getHours(),d.getMinutes(),d.getSeconds()].map(x=>x.toString().padStart(2,'0')).join(':')+'.'+d.getMilliseconds().toString().padStart(3,'0');}

function addEvent(ev){
  const k=ev.kind;
  let icon,klass,label,detail,freq=0;

  if(k==='fill'){
    const f=ev.fill,buy=f.side==='B',twap=f.twapId!=null;
    icon=buy?'🟢':'🔴';klass=buy?'g':'r';label='FILL';freq=buy?660:440;
    const pnl=f.closedPnl&&parseFloat(f.closedPnl)!==0?` <span class="${parseFloat(f.closedPnl)>0?'g':'r'}">PnL ${fmtPnl(f.closedPnl)}</span>`:'';
    detail=`<span class="v">${f.coin}</span> <span class="tag ${buy?'buy':'sell'}">${buy?'BUY':'SELL'}</span>`
      +(twap?' <span class="tag twap">TWAP</span>':'')
      +(f.dir?` <span>${f.dir}</span>`:'')
      +`<br>Price <span class="v">${fmt(f.px)}</span> · Size <span class="v">${fmt(f.sz)}</span>${pnl} · Fee <span class="v">${f.fee} ${f.feeToken}</span>`;

  }else if(k==='order_update'){
    const o=ev.order,st=o.status,ord=o.order||{},twap=ord.twapId!=null;
    const ic={open:'🔷',filled:'✅',canceled:'❌',marginCanceled:'❌',triggered:'⚡',rejected:'🚫'};
    const cl={open:'b',filled:'g',canceled:'',marginCanceled:'',triggered:'y',rejected:'r'};
    icon=ic[st]||'🔹';klass=cl[st]||'';label='ORDER '+st.toUpperCase();
    freq=st==='filled'?880:st==='canceled'?300:0;
    detail=`<span class="v">${ord.coin||''}</span> <span class="tag ${ord.side==='B'?'buy':'sell'}">${ord.side==='B'?'BUY':'SELL'}</span>`
      +(twap?' <span class="tag twap">TWAP</span>':'')
      +` · <span class="v">${ord.orderType||''}</span>`
      +`<br>Price <span class="v">${ord.limitPx||''}</span> · Size <span class="v">${ord.sz||''}</span>`;

  }else if(k==='twap_update'){
    const t=ev.twap,tw=t.twap||{},st=t.status;
    const ic2={activated:'🚀',terminated:'🛑',finished:'✅'};
    icon=ic2[st]||'🔄';klass=st==='activated'?'p':st==='finished'?'g':'r';
    label='TWAP '+st.toUpperCase();freq=st==='activated'?770:330;
    detail=`<span class="v">${tw.coin||''}</span> <span class="tag ${tw.side==='B'?'buy':'sell'}">${tw.side==='B'?'BUY':'SELL'}</span>`
      +`<br>Size <span class="v">${tw.sz||''}</span> · Duration <span class="v">${tw.minutes||''}m</span>`
      +(tw.reduceOnly?' · <span class="y">ReduceOnly</span>':'');

  }else if(k==='liquidation'){
    const l=ev.liq;icon='🚨';klass='r';label='LIQUIDATION';freq=220;
    detail=`Notional <span class="r">${l.liquidated_ntl}</span> · Fee <span class="v">${l.liquidated_fee}</span>`;

  }else if(k==='funding'){
    const f=ev.funding,pos=parseFloat(f.usdc)>=0;
    icon=pos?'📈':'📉';klass=pos?'g':'r';label='FUNDING';
    detail=`<span class="v">${f.coin}</span> · <span class="${pos?'g':'r'}">${fmtPnl(f.usdc)} USDC</span> · Rate <span class="v">${f.funding_rate}</span>`;

  }else if(k==='non_user_cancel'){
    icon='⚠️';klass='y';label='SYS CANCEL';
    detail=`<span class="v">${ev.cancel?.coin||''}</span>`;
  }else return;

  if(freq)beep(freq);

  const d=document.createElement('div');
  d.className='ev';d.dataset.k=k;
  if(activeFilter!=='all'&&activeFilter!==k)d.style.display='none';
  d.innerHTML=`<div class="ev-icon">${icon}</div><div class="ev-body"><div class="ev-head"><span class="ev-kind ${klass}">${label}</span><span class="ev-addr">${short(ev.address)}</span><span class="ev-time">${ts()}</span></div><div class="ev-detail">${detail}</div></div>`;

  empty.style.display='none';
  feed.insertBefore(d,feed.firstChild);
  const all=feed.querySelectorAll('.ev');
  if(all.length>300)all[all.length-1].remove();
  cnt.textContent=++evCount+' event'+(evCount===1?'':'s');

  if(Notification.permission==='granted'&&document.hidden)
    new Notification('HL · '+label,{body:ev.fill?.coin||ev.order?.order?.coin||'',silent:true});
}

// ── Wallet management ────────────────────────────────────────────────────────
async function loadWallets(){
  try{
    const r=await fetch('/api/wallets');
    const list=await r.json();
    renderWallets(list);
  }catch{}
}

function renderWallets(list){
  wList.querySelectorAll('.wallet-item').forEach(e=>e.remove());
  noW.style.display=list.length?'none':'block';
  list.forEach(addr=>{
    const d=document.createElement('div');
    d.className='wallet-item';
    d.innerHTML=`<div class="wallet-addr" title="${addr}">${addr.slice(0,6)}…${addr.slice(-4)}</div><span class="wallet-del" title="remove">✕</span>`;
    d.querySelector('.wallet-del').onclick=async(e)=>{
      e.stopPropagation();
      await fetch('/api/wallets',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({address:addr})});
      loadWallets();
    };
    wList.appendChild(d);
  });
}

btnAdd.onclick=async()=>{
  const addr=inpAddr.value.trim(),label=inpLabel.value.trim();
  if(!addr)return;
  btnAdd.disabled=true;btnAdd.textContent='Adding…';
  try{
    const r=await fetch('/api/wallets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({address:addr,label})});
    if(r.ok){inpAddr.value='';inpLabel.value='';loadWallets();}
    else{const e=await r.json();alert(e.error||'Error');}
  }finally{btnAdd.disabled=false;btnAdd.textContent='+ Add wallet';}
};

inpAddr.onkeydown=e=>{if(e.key==='Enter')btnAdd.click();};

// ── WebSocket ────────────────────────────────────────────────────────────────
let ws,reconn;
function connect(){
  clearTimeout(reconn);
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen=()=>{dot.className='dot ok';statusEl.textContent='connected';};
  ws.onmessage=e=>{try{addEvent(JSON.parse(e.data));}catch{}};
  ws.onclose=ws.onerror=()=>{dot.className='dot wait';statusEl.textContent='reconnecting…';reconn=setTimeout(connect,1500);};
}

if(Notification.permission==='default')Notification.requestPermission();
loadWallets();
connect();
</script>
</body>
</html>
